      ServExpress

      <li class="hover:scale-[1.1] hover:underline"><a href="#">Services</a></li>
      <li class="hover:scale-[1.1] hover:underline"><a href="#">About</a></li>
      <li class="hover:scale-[1.1] hover:underline"><a href="#">Contact</a></li>
    </ul>

  <div class="w-full h-max grid place-items-center" id="profile-container">

    <div class="fixed inset-0 bg-black/50 hidden justify-center items-center" id="modal" >

    <div class="bg-white p-6 rounded-lg flex flex-col gap-4 items-center">
    <img id="avatarPreview" class="w-48 h-48 rounded-full object-cover" src="" alt="Avatar Preview">
    
    <input type="file" id="avatarUpload" accept="image/*" class="hidden">
    <button class="px-4 py-2 bg-blue-600 text-white rounded" onclick="document.getElementById('avatarUpload').click()">
      Upload New Picture
    </button>

    <button id="close-modal" class="px-4 py-2 bg-gray-600 text-white rounded">
      Close
    </button>
  </div>


    </div>


    <div class="hidden inset-0 fixed bg-black/50 items-center justify-center rounded-lg" id="edit-form">
       <div action="" class="flex flex-col w-3/4 h-3/4 overflow-auto items-center bg-gray-200 justify-start gap-4 rounded-lg py-8 px-4 md:w-1/2">
        <div class="w-3/4 flex flex-col gap-2 ">
          <lable class="text-lg font-semibold ">Email: </lable>
          <input type="text" readonly class="border-2 bg-gray-300 rounded-lg h-10 outline-none  px-2" id="emailEdit">
          
        </div>
        <div class="w-3/4 flex flex-col gap-2 ">
          <lable class="text-lg font-semibold ">Username: </lable>
          <input type="text" readonly class="border-2 bg-gray-300 rounded-lg h-10 outline-none px-2" id="username">
        
        </div>
        <div class="w-3/4 flex flex-col gap-2 ">
          <lable class="text-lg font-semibold ">Name: </lable>
          <input type="text" class="border-2 bg-gray-200 rounded-lg h-10 outline-none  px-2" id="fullName" placeholder="Your full name">
          
        </div>
        <div class="w-3/4 flex flex-col gap-2 " id="experienceEdit">
          <lable class="text-lg font-semibold ">Experience: </lable>
          <input type="text" class="border-2 bg-gray-200 rounded-lg h-10 outline-none  px-2" id="experience" placeholder="eg 1 year">
        </div>
        <div class="w-3/4 flex flex-col gap-2 ">
          <lable class="text-lg font-semibold ">Phone: </lable>
          <input type="text" class="border-2 bg-gray-200 rounded-lg h-10 outline-none  px-2" id="phone" placeholder="9999999999">
          
        </div>
        <div class="w-3/4 flex flex-col gap-2 " id="serviceEdit">
          <lable class="text-lg font-semibold ">Service Charge: </lable>
          <input type="text" class="border-2 bg-gray-200 rounded-lg h-10 outline-none  px-2" id="serviceCharge" placeholder="eg 400">
          
        </div>
        
        <div class="w-3/4 flex flex-col gap-2 ">
          <label class="text-lg font-semibold " for="selectCity">Location</label>
        <select class="border-2 bg-gray-200 rounded-lg h-10 outline-none  px-2" name="city" id="selectCity">
          <option value="select">Select</option>
          <option value="gorakhpur">Gorakhpur</option>
          <option value="maharajganj">Maharajganj</option>
          <option value="varanasi">Varanasi</option>
          <option value="lucknow">Lucknow</option>
          <option value="kushinagar">Kushinagar</option>
        </select>
        </div>

<div class="w-3/4 flex flex-col gap-2 " id="categoryEdit">
          <label class="text-lg font-semibold " for="category">category</label>
        <select class="border-2 bg-gray-200 rounded-lg h-10 outline-none  px-2" name="category" id="category">
          <option value="select">Select</option>
          <option value="electrician">Electrician</option>
          <option value="plumber">Plumber</option>
          <option value="painter">Painter</option>
          <option value="carpenter">Carpenter</option>
          
        </select>
          
        </div>
        <div class="flex gap-4 flex-wrap items-center justify-center w-3/4">
          <button type="submit" class="w-20 px-4 py-2 bg-green-600 text-white rounded" type="submit" id="save-edit">Save</button>
          <button class="w-20 px-4 py-2 bg-gray-500 text-white rounded" id="closeEditForm">Cancel</button>
        </div>
       </div>
