<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ServExpress -Login</title>
 <link rel="stylesheet" href="/src/style.css">
</head>
<body class="flex flex-col w-full h-screen justify-start items-center gap-8 p-4 bg-linear-45 from-slate-500 to-slate-800 md:flex-row px-4 ">
 <div class="w-full  grid place-items-center text-indigo-300 md:w-1/2 ">
  <h1 class="font-bold text-4xl py-4 mt-4 border-b-4 ">ServExpress</h1>
  <p class="text-3xl text-center font-bold py-4 text-gray-300">Need for servies!</p>
  <p class="text-2xl text-center font-semibold py-4 text-gray-300"> No worries we bring the professionals on doorsteps.</p>
</div>

  <div class="flex flex-col items-center justify-around rounded-2xl w-3/4 
   bg-white gap-4 py-4 md:w-1/2 md:h-max">
    <H2 class="text-3xl font-bold">Sign In</H2>
    <div class="flex w-full items-center justify-center text-red-600 pt-4" id="errors"></div>


    <form class="flex flex-col gap-12 w-full justify-center items-center h-max">
      <div class="w-3/5 relative">
        <input class="border-b-2 w-full outline-0 input-section" type="text" id="username" placeholder=""  required>
        <label class="absolute inset-0 opacity-70 cursor-text" for="username">username</label>
      </div>
      <div class="w-3/5 relative">
        <input class="border-b-2 w-full outline-0 input-section" type="password" id="password" placeholder=" "  required>
        <label class="absolute inset-0 opacity-70 cursor-text" for="password">Password</label>
      </div>
      <div class="flex justify-around w-3/4 text-sm">
      <div class="flex gap-2">
        <input class="cursor-pointer w-4" type="checkbox" id="checkbox">
        <label for="checkbox">Remeber Me</label>
      </div>
      <a class="hover:text-blue-600" href="#">Forgot password</a>
      </div>
      <div class="w-full flex items-center justify-center">
      <button class="grid place-items-center border-2 w-1/2 h-10 rounded-sm bg-linear-90 from-amber-600 to-amber-300 hover:bg-linear-90 hover:from-amber-400 hover:to-amber-800 transition-colors duration-100 font-bold border-black hover:text-white" type="submit" id="login">Log In</button>
      </div>
    </form>
    <div class="new-account">
      
    <a class="hover:text-blue-600" href="./sign-up.html">Create New Account</a>
  </div>
  </div>
</body>
<script type="module" src="/scripts/login.js"></script>
</html>
