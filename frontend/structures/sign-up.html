<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <link rel="stylesheet" href="/src/style.css">
  <title>ServExpress -Sign-Up</title>
</head>
<body class="w-full p-4 h-screen flex justify-center items-center bg-gray-300 bg-linear-60 from-slate-800 to-slate-500 gap-4">

  <div class="hidden md:flex w-1/2 h-full justify-center items-center flex-col gap-8 px-8 text-center mx-4">
    <h1 class=" font-bold text-white text-7xl">ServExpress</h1>
    <p class="text-3xl text-white ">Book online services with ease!</p>
  </div>


  <div class="flex items-center justify-center w-4/5 h-4/5 py-8 bg-white rounded-tr-4xl rounded-bl-4xl rounded-tl-sm rounded-br-sm relative overflow-hidden md:w-1/2 ">
    <!-- Customer signUp section -->
    <div class="w-full h-full flex flex-col items-center justify-start absolute  transition-all duration-500 translate-x-0 opacity-100" id="customer">
      <form class="w-full h-4/5 flex items-center justify-around flex-col"  id="userSignUp">
        <h2 class="text-3xl font-bold">Customer</h2>
        <div class="w-3/5 relative">
        <input class="border-b-2 w-full outline-0 input-section focus:border-amber-400 not-placeholder-shown:border-amber-400" type="text" id="username" placeholder=""  required>
        <label class="absolute inset-0 opacity-70 cursor-text" for="username">Username</label>
      </div>
        <div class="w-3/5 relative">
        <input class="border-b-2 w-full outline-0 input-section focus:border-amber-400 not-placeholder-shown:border-amber-400" type="email" id="email" placeholder=" " required>
        <label class="absolute inset-0 opacity-70 cursor-text" for="email">E-mail</label>
      </div>
      <div class="w-3/5 relative">
        <input class="border-b-2 w-full outline-0 input-section focus:border-amber-400 not-placeholder-shown:border-amber-400" type="password" id="password" placeholder=" " required>
        <label class="absolute inset-0 opacity-70 cursor-text" for="password">Password</label>
      </div>
         <div class="w-full flex items-center justify-center">
      <button class="border-2 w-1/2 h-10 rounded-sm font-semibold bg-amber-300  hover:bg-amber-500" type="submit">Sign Up</button>
      </div>
      </form>
      <div class="text-3xl font-light border-t-4 w-full flex items-center justify-center border-slate-800 pt-4">
        OR
      </div>
      <div class="flex items-center justify-end w-full h-max flex-col mt-6 gap-4">
        <p>Create Professional Account</p>
        <button class="rounded-4xl border-2 w-max py-2 px-4 font-semibold hover:bg-amber-400 mb-4" id="proBtn">Professional</button>
      </div>
    </div>

    <!-- Professional Signup section -->
    <div class="w-full h-full flex flex-col items-center justify-start absolute opacity-0 translate-x-full transition-all duration-500" id="professional">
      <form class="w-full h-4/5 flex items-center justify-around flex-col" id="professionalSignUp">
        <h2 class="text-3xl font-bold">Professional</h2>
        <div class="w-3/5 relative">
        <input class="border-b-2 w-full outline-0 input-section focus:border-amber-400 not-placeholder-shown:border-amber-400" type="text" id="username-professional" placeholder=" " required>
        <label class="absolute inset-0 opacity-70 cursor-text" for="username-professional">Username</label>
      </div>

        <div class="w-3/5 relative">
        <input class="border-b-2 w-full outline-0 input-section focus:border-amber-400 not-placeholder-shown:border-amber-400" type="text" id="phone-professional" placeholder=" " required>
        <label class="absolute inset-0 opacity-70 cursor-text" for="phone-professional">Phone</label>
      </div>

        <div class="w-3/5 relative">
        <input class="border-b-2 w-full outline-0 input-section focus:border-amber-400 not-placeholder-shown:border-amber-400" type="email" id="email-professional" placeholder=" " required>
        <label class="absolute inset-0 opacity-70 cursor-text" for="email-professional">E-mail</label>
      </div>
      <div class="w-3/5 relative">
        <input class="border-b-2 w-full outline-0 input-section focus:border-amber-400 not-placeholder-shown:border-amber-400" type="password" id="password-professional" placeholder=" " required>
        <label class="absolute inset-0 opacity-70 cursor-text" for="password-professional">Password</label>
      </div>
         <div class="w-full flex items-center justify-center">
      <button class="border-2 w-1/2 h-10 rounded-sm font-semibold bg-amber-300  hover:bg-amber-500" type="submit">Sign Up</button>
      </div>
      </form>
      <div class="flex items-center justify-end w-full h-max flex-col mt-6 gap-4">
         <div class="text-3xl font-light border-t-4 w-full flex items-center justify-center border-slate-800 pt-4">
        OR
      </div>
        <p>Create Customer Account</p>
        <button class="rounded-4xl border-2 w-max py-2 px-4 font-semibold hover:bg-amber-400 mb-4" id="custBtn">Customer</button>
      </div>
    </div>
  </div>
</body>
<script type="module" src="/scripts/sign-up.js"></script>
</html>
